<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review — Balance by m kirk</title>
<meta name="description" content="If you read Balance by m kirk, leave a quick honest review on Amazon or Goodreads.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:wght@400;500&family=Source+Serif+4:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f1e8;
  --ink: #2a2420;
  --ink-soft: #6b5e54;
  --gold: #BC942F;
  --gold-hover: #A37E25;
  --oxblood: #5C1928;            /* aligned with mkirkwrites Balance palette */
  --oxblood-hover: #7A2E40;
  --rule: #d9cebe;
  --banner-bg: #0E1216;          /* m kirk site chrome — same as nav/footer */
  --banner-gold: #C9A85C;        /* m kirk chrome gold */
  --display: 'Cormorant Garamond', Georgia, serif;
  --body: 'Lora', Georgia, serif;
  --chrome: 'Source Serif 4', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  font-size: 17px;
  line-height: 1.6;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ── BANNERS — m kirk chrome bookends ── */
.site-banner {
  background: var(--banner-bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.site-banner--top {
  border-bottom: 1px solid rgba(220,220,230,0.25);
  padding: 12px 40px;
  justify-content: stretch;
}
.site-banner--top-inner {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
}

.site-banner--bottom {
  border-top: 1px solid rgba(91,166,124,0.12);
  flex-direction: column;
  gap: 6px;
  padding: 22px 24px;
}

.banner-mark {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 48px;
  letter-spacing: 0.04em;
  word-spacing: -0.1em;
  color: var(--banner-gold);
  text-decoration: none;
  line-height: 1;
  transition: opacity 0.2s;
}
.banner-mark:hover { opacity: 0.82; }

.banner-nav {
  display: flex;
  gap: 28px;
  align-items: center;
}
.banner-nav a {
  font-family: var(--chrome);
  font-size: 18px;
  letter-spacing: 0.04em;
  color: #B85638;
  text-decoration: none;
  transition: color 0.2s;
}
.banner-nav a:hover { color: #D4704A; }

.banner-copy {
  font-family: var(--chrome);
  font-size: 13px;
  letter-spacing: 0.04em;
  color: #B85638;
}
.banner-copy a {
  color: #B85638;
  text-decoration: none;
  transition: color 0.2s;
}
.banner-copy a:hover { color: #D4704A; }

@media (max-width: 600px) {
  .site-banner--top { padding: 12px 24px; }
  .banner-nav { display: none; }
  .banner-mark { font-size: 40px; }
}

/* ── MAIN ── */
main {
  align-self: center;
  justify-self: center;
  max-width: 480px;
  width: 100%;
  text-align: center;
  padding: 3rem 1.25rem;
}

.mark {
  font-family: var(--display);
  font-style: italic;
  font-size: 0.95rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 2.25rem;
}

.rule {
  width: 36px;
  height: 1px;
  background: var(--rule);
  margin: 0 auto 2.25rem;
}

h1 {
  font-family: var(--display);
  font-weight: 500;
  font-size: clamp(2.1rem, 7vw, 2.9rem);
  line-height: 1.15;
  margin-bottom: 1.25rem;
  letter-spacing: -0.01em;
}

h1 .balance-word {
  font-style: italic;
  font-weight: 700;
  color: var(--oxblood);
}

.lede {
  font-size: 1.02rem;
  color: var(--ink-soft);
  margin: 0 auto 2.5rem;
  max-width: 36ch;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.btn {
  display: block;
  padding: 1.05rem 1.5rem;
  text-decoration: none;
  font-family: var(--body);
  font-weight: 500;
  font-size: 0.98rem;
  letter-spacing: 0.04em;
  border-radius: 2px;
  transition: background 0.2s ease, transform 0.2s ease;
}

.btn:hover, .btn:focus-visible {
  transform: translateY(-1px);
  outline: none;
}

.btn--amazon {
  background: var(--gold);
  color: var(--oxblood);
}
.btn--amazon:hover, .btn--amazon:focus-visible {
  background: var(--gold-hover);
}

.btn--goodreads {
  background: var(--oxblood);
  color: var(--bg);
}
.btn--goodreads:hover, .btn--goodreads:focus-visible {
  background: var(--oxblood-hover);
}

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

main > * {
  animation: rise 0.6s ease-out backwards;
}
.mark    { animation-delay: 0.05s; }
.rule    { animation-delay: 0.15s; }
h1       { animation-delay: 0.25s; }
.lede    { animation-delay: 0.35s; }
.actions { animation-delay: 0.45s; }

@media (prefers-reduced-motion: reduce) {
  main > * { animation: none; }
  .btn:hover, .btn:focus-visible { transform: none; }
}
</style>
</head>
<body>

<header class="site-banner site-banner--top">
  <div class="site-banner--top-inner">
    <a href="index.html" class="banner-mark" aria-label="m kirk — home">m kirk</a>
    <nav class="banner-nav" aria-label="Site">
      <a href="mkirk-books.html">Books</a>
      <a href="mkirk-about.html">About</a>
      <a href="mailto:matt@thatsgoodedesign.com">Contact</a>
    </nav>
  </div>
</header>

<main>
  <div class="mark">m kirk</div>
  <div class="rule"></div>
  <h1>Thank you for reading <span class="balance-word">Balance</span>.</h1>
  <p class="lede">If it stayed with you, leave a few honest words. It's how the next reader finds it.</p>
  <div class="actions">
    <a class="btn btn--amazon" href="https://www.amazon.com/dp/B0GS7C4GKZ#customerReviews" target="_blank" rel="noopener">Review on Amazon</a>
    <a class="btn btn--goodreads" href="https://www.goodreads.com/book/show/249575766-balance" target="_blank" rel="noopener">Review on Goodreads</a>
  </div>
</main>

<footer class="site-banner site-banner--bottom">
  <a href="index.html" class="banner-mark" aria-label="m kirk — home">m kirk</a>
  <p class="banner-copy">© m kirk · <a href="index.html">mkirkwrites.com</a></p>
</footer>

</body>
</html>
